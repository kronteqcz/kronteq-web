server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Relative redirects (preserves port in URL)
    absolute_redirect off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/woff2;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Cache static assets
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — no cache (so rebuilds take effect immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback for Astro static output
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # RSS and Sitemap
    location ~ ^/(rss|sitemap)\.xml$ {
        expires 1h;
        add_header Cache-Control "public";
        add_header Content-Type "application/xml";
    }
}
