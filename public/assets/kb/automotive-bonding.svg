<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aplikace lepidla v automobilovém průmyslu — karoserie, zasklívání, baterie EV">
  <defs>
    <linearGradient id="abBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0820"/>
      <stop offset="100%" stop-color="#160F2E"/>
    </linearGradient>
    <linearGradient id="abBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="abGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="abBattery" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2040"/>
    </linearGradient>
    <linearGradient id="abAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="abFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="abShadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#abBg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#1D1038" opacity="0.9"/>
  <text x="40" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="#A78BFA" opacity="0.85">KRONTEQ — AUTOMOTIVE</text>
  <text x="1160" y="30" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#4a4060">Aplikační mapa: lepení v karoserii vozidla</text>

  <!-- ===== VEHICLE SILHOUETTE (simplified side view) ===== -->
  <!-- Road / ground shadow -->
  <ellipse cx="600" cy="440" rx="420" ry="22" fill="#000" opacity="0.3"/>

  <!-- Car body outline — simple sedan shape -->
  <!-- Floor pan -->
  <rect x="200" y="350" width="760" height="40" rx="6" fill="url(#abFloor)" filter="url(#abShadow)"/>

  <!-- Main body sides -->
  <path d="M 200 350 L 200 270 Q 210 220 270 200 L 380 160 Q 430 140 520 138 L 720 138 Q 810 140 860 180 L 940 240 Q 960 268 960 295 L 960 350 Z"
        fill="url(#abBody)" filter="url(#abShadow)"/>

  <!-- Roof -->
  <path d="M 380 160 Q 430 140 520 138 L 720 138 Q 780 140 830 162 L 720 150 L 520 150 Z"
        fill="#b8c0cc"/>

  <!-- Windshield -->
  <path d="M 395 162 Q 430 142 520 140 L 510 200 Q 460 210 415 225 Z"
        fill="url(#abGlass)" opacity="0.85"/>

  <!-- Rear window -->
  <path d="M 730 140 Q 790 144 830 164 L 800 220 Q 770 228 740 225 Z"
        fill="url(#abGlass)" opacity="0.75"/>

  <!-- Wheels -->
  <circle cx="310" cy="392" r="52" fill="#1f2937" stroke="#374151" stroke-width="3"/>
  <circle cx="310" cy="392" r="34" fill="#374151" stroke="#4b5563" stroke-width="2"/>
  <circle cx="310" cy="392" r="14" fill="#6b7280"/>
  <circle cx="850" cy="392" r="52" fill="#1f2937" stroke="#374151" stroke-width="3"/>
  <circle cx="850" cy="392" r="34" fill="#374151" stroke="#4b5563" stroke-width="2"/>
  <circle cx="850" cy="392" r="14" fill="#6b7280"/>

  <!-- Window frame / door line (subtle) -->
  <line x1="560" y1="140" x2="568" y2="295" stroke="#9ca3af" stroke-width="2" opacity="0.4"/>

  <!-- ===== APPLICATION MARKERS ===== -->

  <!-- 1. Windshield structural glazing -->
  <circle cx="450" cy="182" r="12" fill="#7C3AED" opacity="0.9" filter="url(#abShadow)"/>
  <text x="450" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">1</text>

  <!-- 2. Roof bonding / structural -->
  <circle cx="600" cy="143" r="12" fill="#7C3AED" opacity="0.9"/>
  <text x="600" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">2</text>

  <!-- 3. Body seams / weld-bonding -->
  <circle cx="370" cy="268" r="12" fill="#7C3AED" opacity="0.9"/>
  <text x="370" y="273" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">3</text>

  <!-- 4. Floor / battery tray (EV) -->
  <circle cx="580" cy="358" r="12" fill="#22c55e" opacity="0.9"/>
  <text x="580" y="363" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">4</text>

  <!-- 5. Hem flange / door edges -->
  <circle cx="790" cy="295" r="12" fill="#7C3AED" opacity="0.9"/>
  <text x="790" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">5</text>

  <!-- ===== LEGEND ===== -->
  <rect x="100" y="62" width="460" height="150" rx="8" fill="#1D1038" opacity="0.85"/>
  <text x="120" y="88" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#A78BFA">Aplikace lepidel v karoserii</text>

  <circle cx="122" cy="108" r="8" fill="#7C3AED"/>
  <text x="122" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">1</text>
  <text x="138" y="112" font-family="system-ui, sans-serif" font-size="12" fill="#EDE9F8">Strukturální zasklívání (MS polymer)</text>

  <circle cx="122" cy="130" r="8" fill="#7C3AED"/>
  <text x="122" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">2</text>
  <text x="138" y="134" font-family="system-ui, sans-serif" font-size="12" fill="#EDE9F8">Lepení střechy / panoramatický střešní panel</text>

  <circle cx="122" cy="152" r="8" fill="#7C3AED"/>
  <text x="122" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">3</text>
  <text x="138" y="156" font-family="system-ui, sans-serif" font-size="12" fill="#EDE9F8">Weld-bonding karoserických spojů (epoxid)</text>

  <circle cx="122" cy="174" r="8" fill="#22c55e"/>
  <text x="122" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">4</text>
  <text x="138" y="178" font-family="system-ui, sans-serif" font-size="12" fill="#EDE9F8">Fixace baterií EV — termálně vodivé lepidlo</text>

  <circle cx="122" cy="196" r="8" fill="#7C3AED"/>
  <text x="122" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">5</text>
  <text x="138" y="200" font-family="system-ui, sans-serif" font-size="12" fill="#EDE9F8">Hem flange — límcové lepení dveří / kapoty</text>

  <!-- ===== STAT BOX ===== -->
  <rect x="760" y="62" width="340" height="100" rx="8" fill="#1D1038" opacity="0.85"/>
  <text x="930" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9ca3af" letter-spacing="0.06em">PRŮMĚRNÉ VOZIDLO OBSAHUJE</text>
  <text x="930" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#A78BFA">15–20</text>
  <text x="930" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#EDE9F8">kg lepidel, tmelů a pásek</text>
</svg>
