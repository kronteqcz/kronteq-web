<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lepení v elektronice — fixace displejů, teplovodivá lepidla, zapouzdřování PCB, správa tepla baterií">
  <defs>
    <linearGradient id="elBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0820"/><stop offset="100%" stop-color="#160F2E"/>
    </linearGradient>
    <linearGradient id="elPCB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/><stop offset="100%" stop-color="#0f3d22"/>
    </linearGradient>
    <radialGradient id="elHeat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="520" fill="url(#elBg)"/>
  <rect x="0" y="0" width="1200" height="48" fill="#1D1038" opacity="0.9"/>
  <text x="40" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="#A78BFA" opacity="0.85">KRONTEQ — ELEKTRONIKA</text>
  <text x="1160" y="30" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#4a4060">Aplikace lepidel v elektronice</text>

  <!-- === PCB BOARD (main element) === -->
  <rect x="180" y="100" width="580" height="320" rx="8" fill="url(#elPCB)" stroke="#166534" stroke-width="2" stroke-opacity="0.6"/>
  <!-- PCB texture / traces -->
  <g stroke="#15803d" stroke-width="1.5" fill="none" opacity="0.35">
    <line x1="220" y1="130" x2="340" y2="130"/> <line x1="340" y1="130" x2="340" y2="180"/>
    <line x1="300" y1="200" x2="500" y2="200"/> <line x1="500" y1="200" x2="500" y2="150"/>
    <line x1="400" y1="260" x2="600" y2="260"/> <line x1="220" y1="300" x2="450" y2="300"/>
    <line x1="550" y1="160" x2="720" y2="160"/> <line x1="400" y1="340" x2="700" y2="340"/>
    <line x1="220" y1="380" x2="620" y2="380"/>
  </g>
  <!-- Solder pads (small rectangles) -->
  <g fill="#86efac" opacity="0.4">
    <rect x="220" y="126" width="16" height="8" rx="1"/>
    <rect x="340" y="176" width="16" height="8" rx="1"/>
    <rect x="494" y="146" width="16" height="8" rx="1"/>
  </g>

  <!-- === CHIP / COMPONENT (power device) === -->
  <rect x="380" y="190" width="130" height="90" rx="4" fill="#1e1b4b" stroke="#7C3AED" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Heat glow under chip -->
  <ellipse cx="445" cy="235" rx="90" ry="60" fill="url(#elHeat)"/>
  <text x="445" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#A78BFA">POWER IC</text>
  <text x="445" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af">85 °C TJ max</text>

  <!-- === THERMAL PAD (under chip, between chip and heatsink) === -->
  <!-- Thermal adhesive layer -->
  <rect x="376" y="280" width="138" height="14" rx="2" fill="#f97316" opacity="0.6"/>
  <rect x="376" y="294" width="138" height="36" rx="0" fill="#374151"/>
  <!-- Heatsink fins -->
  <g fill="#4b5563" stroke="#374151" stroke-width="1">
    <rect x="388" y="294" width="8" height="36" rx="1"/>
    <rect x="404" y="294" width="8" height="36" rx="1"/>
    <rect x="420" y="294" width="8" height="36" rx="1"/>
    <rect x="436" y="294" width="8" height="36" rx="1"/>
    <rect x="452" y="294" width="8" height="36" rx="1"/>
    <rect x="468" y="294" width="8" height="36" rx="1"/>
    <rect x="484" y="294" width="8" height="36" rx="1"/>
    <rect x="500" y="294" width="8" height="36" rx="1"/>
  </g>
  <!-- Heat arrows -->
  <g stroke="#f97316" stroke-width="1.5" opacity="0.5">
    <line x1="445" y1="330" x2="445" y2="345"/> <polygon points="445,348 441,336 449,336" fill="#f97316" opacity="0.5"/>
    <line x1="415" y1="325" x2="415" y2="340"/>
    <line x1="475" y1="325" x2="475" y2="340"/>
  </g>

  <!-- === DISPLAY BOND (top of PCB area) === -->
  <!-- Display glass -->
  <rect x="190" y="110" width="220" height="60" rx="4" fill="#bfdbfe" opacity="0.2" stroke="#93c5fd" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- OCA/adhesive layer -->
  <rect x="190" y="170" width="220" height="10" rx="1" fill="#7C3AED" opacity="0.5"/>
  <text x="300" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#93c5fd" opacity="0.7">OLED / LCD display</text>

  <!-- === POTTING / ENCAPSULATION area === -->
  <rect x="580" y="120" width="150" height="100" rx="6" fill="#1e40af" opacity="0.15" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4" stroke-opacity="0.4"/>
  <!-- Potting compound fill -->
  <rect x="580" y="170" width="150" height="50" rx="0" fill="#1d4ed8" opacity="0.3"/>
  <!-- Component inside -->
  <rect x="600" y="130" width="50" height="30" rx="2" fill="#374151"/>
  <rect x="660" y="130" width="55" height="30" rx="2" fill="#374151"/>
  <text x="655" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#93c5fd" opacity="0.7">zapouzdření PU/EP</text>

  <!-- === CALLOUTS === -->
  <!-- Display bonding -->
  <line x1="300" y1="110" x2="300" y2="72" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="180" y="55" width="240" height="18" rx="4" fill="#1D1038" opacity="0.85"/>
  <text x="300" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#EDE9F8">OCA / UV lepení displeje</text>

  <!-- Thermal adhesive -->
  <line x1="520" y1="287" x2="600" y2="320" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="590" y="308" width="220" height="18" rx="4" fill="#1D1038" opacity="0.85"/>
  <text x="700" y="321" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fdba74">Teplovodivé lepidlo (TIM)</text>

  <!-- Potting -->
  <line x1="655" y1="160" x2="760" y2="120" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="750" y="108" width="180" height="18" rx="4" fill="#1D1038" opacity="0.85"/>
  <text x="840" y="121" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#93c5fd">Zapouzdřovací hmota (PU/EP)</text>

  <!-- === INFO CARDS (right side) === -->
  <rect x="820" y="62" width="340" height="370" rx="10" fill="#1D1038" opacity="0.85"/>
  <text x="990" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#A78BFA">Typy aplikací</text>

  <!-- Card 1: OCA -->
  <rect x="836" y="102" width="308" height="72" rx="6" fill="#7C3AED" fill-opacity="0.1" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.3"/>
  <text x="990" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#C4B5FD">OCA — fixace displejů</text>
  <text x="990" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">opticky čirý akrylát (t = 0,05–0,3 mm)</text>
  <text x="990" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">UV vytvrzení, index lomu ≈ sklo</text>

  <!-- Card 2: TIM -->
  <rect x="836" y="184" width="308" height="72" rx="6" fill="#f97316" fill-opacity="0.08" stroke="#f97316" stroke-width="1" stroke-opacity="0.3"/>
  <text x="990" y="204" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fdba74">TIM — správa tepla</text>
  <text x="990" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">λ = 1–10 W/(m·K), silikon/epoxid</text>
  <text x="990" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">pro výkonové tranzistory, baterie EV</text>

  <!-- Card 3: Potting -->
  <rect x="836" y="266" width="308" height="72" rx="6" fill="#1d4ed8" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="990" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Zapouzdření / Potting</text>
  <text x="990" y="304" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">PU / EP, IP67–IP69 ochrana</text>
  <text x="990" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">vibrace, vlhkost, chemická odolnost</text>

  <!-- Card 4: Conductive -->
  <rect x="836" y="348" width="308" height="72" rx="6" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="990" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#86efac">Vodivé lepidlo (ECA)</text>
  <text x="990" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">náhrada pájky (Ag plnivo, &lt;5 Ω·cm)</text>
  <text x="990" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">MEMS, sensory, flex hybridní okruhy</text>

  <!-- Bottom note -->
  <rect x="60" y="438" width="740" height="62" rx="8" fill="#1D1038" opacity="0.6"/>
  <text x="430" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#EDE9F8">Klíčové parametry výběru v elektronice</text>
  <text x="430" y="476" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">Elektrická izolace nebo vodivost · Teplotní cyklování (−40 až +150 °C) · Index lomu · Outgassing (kosmické aplikace)</text>
  <text x="430" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">UL94-V0 hořlavost · RoHS / REACH shoda</text>
</svg>
