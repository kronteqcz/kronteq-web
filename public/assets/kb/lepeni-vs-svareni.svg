<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Srovnání: svařování vs. konstrukční lepení — pevnost, materiály, koroze, NVH, náklady">
  <defs>
    <linearGradient id="lvsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0820"/><stop offset="100%" stop-color="#160F2E"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" fill="url(#lvsBg)"/>
  <rect x="0" y="0" width="1200" height="48" fill="#1D1038" opacity="0.9"/>
  <text x="40" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="#A78BFA" opacity="0.85">KRONTEQ — SROVNÁNÍ TECHNOLOGIÍ</text>
  <text x="1160" y="30" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#4a4060">Svařování vs. konstrukční lepení</text>

  <!-- Column headers -->
  <rect x="400" y="58" width="340" height="40" rx="6" fill="#374151" opacity="0.7"/>
  <text x="570" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EDE9F8">Svařování (MIG/MAG/spot)</text>

  <rect x="760" y="58" width="380" height="40" rx="6" fill="#3D2870" opacity="0.8"/>
  <text x="950" y="83" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#C4B5FD">Konstrukční lepení</text>

  <!-- Row data -->
  <!-- Row backgrounds alternating -->
  <rect x="60" y="108" width="1080" height="52" rx="0" fill="#1D1038" opacity="0.4"/>
  <rect x="60" y="212" width="1080" height="52" rx="0" fill="#1D1038" opacity="0.4"/>
  <rect x="60" y="316" width="1080" height="52" rx="0" fill="#1D1038" opacity="0.4"/>
  <rect x="60" y="420" width="1080" height="52" rx="0" fill="#1D1038" opacity="0.4"/>

  <!-- Category labels -->
  <g font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9ca3af">
    <text x="220" y="140" text-anchor="middle">Pevnost spoje</text>
    <text x="220" y="193" text-anchor="middle">Materiálová</text>
    <text x="220" y="208" text-anchor="middle">flexibilita</text>
    <text x="220" y="244" text-anchor="middle">Distribuce napětí</text>
    <text x="220" y="297" text-anchor="middle">NVH / vibrace</text>
    <text x="220" y="312" text-anchor="middle">a hluk</text>
    <text x="220" y="348" text-anchor="middle">Koroze v místě spoje</text>
    <text x="220" y="401" text-anchor="middle">Vizuální výsledek</text>
    <text x="220" y="416" text-anchor="middle">(bez opracování)</text>
    <text x="220" y="452" text-anchor="middle">Rychlost výroby</text>
  </g>

  <!-- Vertical dividers -->
  <line x1="390" y1="100" x2="390" y2="480" stroke="#A78BFA" stroke-width="1" opacity="0.1"/>
  <line x1="750" y1="100" x2="750" y2="480" stroke="#A78BFA" stroke-width="1" opacity="0.15"/>

  <!-- === WELDING column === -->
  <!-- Pevnost -->
  <text x="570" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#EDE9F8">Vysoká (bodově)</text>
  <text x="570" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">koncentrace napětí v HAZ</text>
  <!-- Bar -->
  <rect x="420" y="155" width="220" height="8" rx="4" fill="#374151" opacity="0.4"/>
  <rect x="420" y="155" width="165" height="8" rx="4" fill="#f59e0b" opacity="0.7"/>

  <!-- Materiálová flex -->
  <text x="570" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">Omezená</text>
  <text x="570" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">ocel + ocel; hliník+CFRP = problém</text>
  <rect x="420" y="258" width="220" height="8" rx="4" fill="#374151" opacity="0.4"/>
  <rect x="420" y="258" width="80" height="8" rx="4" fill="#ef4444" opacity="0.7"/>

  <!-- Distribuce -->
  <text x="570" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">Bodová</text>
  <text x="570" y="357" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">vrub a lokální plastická deformace</text>
  <rect x="420" y="362" width="220" height="8" rx="4" fill="#374151" opacity="0.4"/>
  <rect x="420" y="362" width="60" height="8" rx="4" fill="#ef4444" opacity="0.7"/>

  <!-- NVH -->
  <text x="570" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#f59e0b">Nízká tlumení</text>
  <text x="570" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">vibrace se přenášejí spojem</text>
  <!-- Koroze -->
  <text x="570" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">Vysoké riziko</text>
  <text x="570" y="461" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">galvanická koroze, HAZ oslabení</text>

  <!-- === BONDING column === -->
  <!-- Pevnost -->
  <text x="950" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e">Vysoká (plošně)</text>
  <text x="950" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">rovnoměrné rozložení po ploše</text>
  <rect x="800" y="155" width="290" height="8" rx="4" fill="#374151" opacity="0.4"/>
  <rect x="800" y="155" width="250" height="8" rx="4" fill="#22c55e" opacity="0.7"/>

  <!-- Materiálová flex -->
  <text x="950" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e">Univerzální</text>
  <text x="950" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">ocel, hliník, CFRP, sklo, plast</text>
  <rect x="800" y="258" width="290" height="8" rx="4" fill="#374151" opacity="0.4"/>
  <rect x="800" y="258" width="280" height="8" rx="4" fill="#22c55e" opacity="0.7"/>

  <!-- Distribuce -->
  <text x="950" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e">Plošná</text>
  <text x="950" y="357" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">žádné koncentrace, nižší únava</text>
  <rect x="800" y="362" width="290" height="8" rx="4" fill="#374151" opacity="0.4"/>
  <rect x="800" y="362" width="285" height="8" rx="4" fill="#22c55e" opacity="0.7"/>

  <!-- NVH -->
  <text x="950" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e">Vysoké tlumení</text>
  <text x="950" y="409" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">lepidlo tlumí vibrace a hluk</text>

  <!-- Koroze -->
  <text x="950" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e">Minimální</text>
  <text x="950" y="461" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">izolace materiálů, těsnost spoje</text>

  <!-- Horizontal dividers -->
  <g stroke="#A78BFA" stroke-width="1" opacity="0.08">
    <line x1="60" y1="160" x2="1140" y2="160"/>
    <line x1="60" y1="264" x2="1140" y2="264"/>
    <line x1="60" y1="368" x2="1140" y2="368"/>
    <line x1="60" y1="420" x2="1140" y2="420"/>
    <line x1="60" y1="472" x2="1140" y2="472"/>
  </g>
</svg>
