<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Schéma anatomie lepeného spoje — adheze, koheeze a substráty">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0820"/>
      <stop offset="100%" stop-color="#160F2E"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b8c8"/>
      <stop offset="100%" stop-color="#78849a"/>
    </linearGradient>
    <linearGradient id="cfrp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="adhesive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="adhesionZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="cfrpPattern" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#1f2937"/>
      <line x1="0" y1="6" x2="12" y2="6" stroke="#374151" stroke-width="4"/>
      <line x1="6" y1="0" x2="6" y2="12" stroke="#4b5563" stroke-width="2" stroke-opacity="0.4"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#1D1038" opacity="0.9"/>
  <text x="40" y="30" font-family="system-ui, sans-serif" font-size="12" font-weight="600" letter-spacing="0.12em" fill="#A78BFA" opacity="0.85">KRONTEQ — ZNALOSTNÍ BÁZE</text>
  <text x="1160" y="30" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" fill="#4a4060">Anatomie lepeného spoje</text>

  <!-- ===== TOP SUBSTRATE — STEEL ===== -->
  <rect x="120" y="72" width="760" height="96" rx="4" fill="url(#steel)"/>
  <rect x="120" y="72" width="760" height="24" rx="4" fill="white" opacity="0.07"/>
  <!-- Substrate A label -->
  <text x="500" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#1a1025">Substrát A — ocel (S355)</text>

  <!-- ===== ADHESION ZONE A ===== -->
  <rect x="120" y="168" width="760" height="32" fill="url(#adhesionZone)" filter="url(#glow)"/>
  <text x="500" y="189" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#EDE9F8" opacity="0.9">Zóna adheze A — chemická vazba lepidlo / kov</text>

  <!-- ===== ADHESIVE BULK ===== -->
  <rect x="120" y="200" width="760" height="120" fill="url(#adhesive)"/>
  <!-- Internal texture -->
  <g opacity="0.12" stroke="#C4B5FD" stroke-width="1">
    <line x1="120" y1="222" x2="880" y2="222"/>
    <line x1="120" y1="244" x2="880" y2="244"/>
    <line x1="120" y1="266" x2="880" y2="266"/>
    <line x1="120" y1="288" x2="880" y2="288"/>
    <line x1="120" y1="310" x2="880" y2="310"/>
  </g>
  <!-- Koheeze label -->
  <text x="500" y="266" text-anchor="middle" font-family="system-ui, sans-serif" font-size="19" font-weight="700" fill="#EDE9F8">Kohezní zóna — tuhnutí lepidla</text>
  <text x="500" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#C4B5FD" opacity="0.8">tloušťka spoje 0,1–0,5 mm (konstrukční) · 1–6 mm (elastický)</text>

  <!-- ===== ADHESION ZONE B ===== -->
  <rect x="120" y="320" width="760" height="32" fill="url(#adhesionZone)" filter="url(#glow)"/>
  <text x="500" y="341" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#EDE9F8" opacity="0.9">Zóna adheze B — chemická vazba lepidlo / CFRP</text>

  <!-- ===== BOTTOM SUBSTRATE — CFRP ===== -->
  <rect x="120" y="352" width="760" height="96" rx="4" fill="url(#cfrpPattern)"/>
  <rect x="120" y="352" width="760" height="96" rx="4" fill="#374151" opacity="0.3"/>
  <!-- Carbon fibre lines -->
  <g opacity="0.4" stroke="#6b7280" stroke-width="1.5">
    <line x1="140" y1="368" x2="860" y2="368"/>
    <line x1="140" y1="384" x2="860" y2="384"/>
    <line x1="140" y1="400" x2="860" y2="400"/>
    <line x1="140" y1="416" x2="860" y2="416"/>
    <line x1="140" y1="432" x2="860" y2="432"/>
  </g>
  <text x="500" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#EDE9F8">Substrát B — CFRP (uhlíkový kompozit)</text>

  <!-- ===== FORCE ARROWS (left side) ===== -->
  <g fill="#F59E0B" stroke="#F59E0B">
    <line x1="80" y1="100" x2="80" y2="300" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="80,80 73,100 87,100"/>
    <line x1="80" y1="420" x2="80" y2="220" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="80,440 73,420 87,420"/>
  </g>
  <text x="50" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F59E0B" transform="rotate(-90, 50, 262)">Tahová síla F</text>

  <!-- ===== FAILURE MODES (right side) ===== -->
  <g>
    <!-- Adhesion failure indicator -->
    <line x1="900" y1="184" x2="1000" y2="170" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
    <circle cx="903" cy="184" r="4" fill="#ef4444"/>
    <text x="1005" y="168" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">Adhezní lom</text>
    <text x="1005" y="184" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">(oddělení na rozhraní)</text>

    <!-- Cohesion failure indicator -->
    <line x1="900" y1="262" x2="1000" y2="262" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
    <circle cx="903" cy="262" r="4" fill="#22c55e"/>
    <text x="1005" y="258" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e">Kohezní lom</text>
    <text x="1005" y="274" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">(trhlina v lepidle)</text>

    <!-- Adhesion failure B indicator -->
    <line x1="900" y1="336" x2="1000" y2="356" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
    <circle cx="903" cy="336" r="4" fill="#ef4444"/>
    <text x="1005" y="352" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">Adhezní lom B</text>
    <text x="1005" y="368" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">(nejslabší spoj)</text>
  </g>

  <!-- ===== LEGEND / IDEAL STATE ===== -->
  <rect x="120" y="470" width="760" height="36" rx="6" fill="#1D1038" opacity="0.7"/>
  <circle cx="160" cy="488" r="6" fill="#22c55e"/>
  <text x="176" y="493" font-family="system-ui, sans-serif" font-size="13" fill="#EDE9F8">Kohezní lom = ideální stav (lepidlo bylo silnější než rozhraní)</text>
  <circle cx="600" cy="488" r="6" fill="#ef4444"/>
  <text x="616" y="493" font-family="system-ui, sans-serif" font-size="13" fill="#EDE9F8">Adhezní lom = selhání přípravy povrchu</text>
</svg>
